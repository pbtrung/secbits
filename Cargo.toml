[package]
name = "secbits"
version = "0.1.0"
edition = "2021"

[dependencies]
brotli = "8.0"
clap = { version = "4.5", features = ["derive"] }
hkdf = "0.12"
hmac = "0.12"
rand = "0.9"
rusqlite = { version = "0.37", features = ["bundled"] }
sha3 = "0.10"
subtle = "2.6"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
zeroize = "1.8"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.21"
