# Meson cross-compilation file for Emscripten / WebAssembly
# Usage:
#   cp meson.build.wasm meson.build
#   meson setup build-wasm --cross-file wasm-cross.ini \
#         -Ddisable-asm=true -Defi=disabled -Dtests=disabled
#   ninja -C build-wasm

[binaries]
c      = '/usr/lib/emscripten/emcc'
ar     = '/usr/lib/emscripten/emar'
strip  = '/usr/lib/emscripten/emstrip'
nm     = '/usr/lib/emscripten/emnm'
ranlib = '/usr/lib/emscripten/emranlib'

[properties]
# Tell Meson not to try to run compiled binaries during config
needs_exe_wrapper = true

[host_machine]
system     = 'emscripten'
cpu_family = 'wasm32'
cpu        = 'wasm32'
endian     = 'little'
